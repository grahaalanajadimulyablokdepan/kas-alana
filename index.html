<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kas Blok Depan Graha Alana</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

<header class="bg-dark text-white text-center py-4">
<h1>Kas Blok Depan Graha Alana</h1>
<p>Blok A1 • A2 • A3 • B1 • B2 • B3</p>
</header>

<div id="loginBox" class="container mt-4">
<div class="card p-4 shadow">
<h3>Login Pengurus</h3>

<input id="adminPass" class="form-control mb-3" type="password" placeholder="Password pengurus">

<button class="btn btn-primary" onclick="loginAdmin()">Login</button>
</div>
</div>

<div class="container mt-4">

<div class="row g-3">

<div class="col-md-4">
<div class="card text-center shadow">
<div class="card-body">
<h5>Total Kas</h5>
<h3 id="totalKas">Rp0</h3>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card text-center shadow">
<div class="card-body">
<h5>Iuran Masuk</h5>
<h3 id="totalIuran">Rp0</h3>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card text-center shadow">
<div class="card-body">
<h5>Pengeluaran</h5>
<h3 id="totalKeluar">Rp0</h3>
</div>
</div>
</div>

</div>

<div class="card mt-4 shadow">
<div class="card-body">
<h2>Grafik Kas</h2>
<canvas id="chart"></canvas>
</div>
</div>

<div id="adminPanel" style="display:none">

<div class="card mt-4 shadow">
<div class="card-body">

<h2>Input Iuran</h2>

<input class="form-control mb-2" id="nama" placeholder="Nama warga">

<select class="form-control mb-2" id="blok">
<option>A1</option>
<option>A2</option>
<option>A3</option>
<option>B1</option>
<option>B2</option>
<option>B3</option>
</select>

<input class="form-control mb-2" id="rumah" placeholder="Nomor rumah">

<select class="form-control mb-2" id="bulan">
<option>Januari</option>
<option>Februari</option>
<option>Maret</option>
<option>April</option>
<option>Mei</option>
<option>Juni</option>
<option>Juli</option>
<option>Agustus</option>
<option>September</option>
<option>Oktober</option>
<option>November</option>
<option>Desember</option>
</select>

<input class="form-control mb-2" id="tahun" placeholder="Tahun (contoh 2026)">

<input class="form-control mb-3" id="jumlah" placeholder="Jumlah iuran">

<button class="btn btn-success" onclick="tambahIuran()">Simpan Iuran</button>

</div>
</div>

<div class="card mt-4 shadow">
<div class="card-body">

<h2>Input Pengeluaran</h2>

<input class="form-control mb-2" id="ket" placeholder="Keterangan">

<input class="form-control mb-3" id="jumlahKeluar" placeholder="Jumlah pengeluaran">

<button class="btn btn-danger" onclick="tambahPengeluaran()">Simpan</button>

</div>
</div>

</div>

<div class="card mt-4 shadow">
<div class="card-body">

<h2>Cek Iuran Rumah</h2>

<input class="form-control mb-3" id="cek" placeholder="contoh A1-10" onkeyup="cekRumah()">

<div id="hasil"></div>

</div>
</div>

<div class="card mt-4 shadow">
<div class="card-body">

<h2>Riwayat Iuran</h2>

<table class="table table-bordered">

<thead>
<tr>
<th>Nama</th>
<th>Blok</th>
<th>Rumah</th>
<th>Bulan</th>
<th>Tahun</th>
<th>Jumlah</th>
</tr>
</thead>

<tbody id="tabelIuran"></tbody>

</table>

</div>
</div>

</div>

<script src="firebase.js"></script>
<script src="app.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

function loginAdmin(){

let pass = document.getElementById("adminPass").value

if(pass === "blokdepan123"){

document.getElementById("adminPanel").style.display="block"
document.getElementById("loginBox").style.display="none"

}else{

alert("Password salah")

}

}

</script>

</body>
</html>
