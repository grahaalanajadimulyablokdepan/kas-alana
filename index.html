<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>KAS GRAHA ALANA BLOK DEPAN</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

<!-- HEADER -->

<header class="header">

<div class="logo">
🏡 KAS GRAHA ALANA BLOK DEPAN
</div>

<button class="hamburger" onclick="toggleMenu()">☰</button>

</header>

<!-- SIDE MENU -->

<div id="sideMenu" class="sideMenu">

<h4>Menu Lingkungan</h4>

<button onclick="openInfo('tentang')">Tentang Perumahan</button>
<button onclick="openInfo('visi')">Visi & Misi</button>
<button onclick="openInfo('fasilitas')">Fasilitas</button>
<button onclick="openInfo('keamanan')">Sistem Keamanan</button>
<button onclick="openInfo('peraturan')">Peraturan Warga</button>
<button onclick="openInfo('pengumuman')">Pengumuman</button>
<button onclick="openInfo('kontak')">Kontak Pengurus</button>

<hr>

<button onclick="showPopup('komplainPopup')">Komplain</button>
<button onclick="showPopup('komplainListPopup')">Daftar Komplain</button>

</div>

<!-- DASHBOARD -->

<div class="container mt-4">

<div class="row g-3">

<div class="col-md-4">

<div class="card dashboardCard">

<h6>Total Iuran</h6>
<h3 id="totalIuran">Rp0</h3>

</div>

</div>

<div class="col-md-4">

<div class="card dashboardCard">

<h6>Total Pengeluaran</h6>
<h3 id="totalKeluar">Rp0</h3>

</div>

</div>

<div class="col-md-4">

<div class="card dashboardCard">

<h6>Total Kas</h6>
<h3 id="totalKas">Rp0</h3>

<button class="btn btn-dark btn-sm" onclick="showPopup('detailKasPopup')">
Detail Kas
</button>

</div>

</div>

</div>

<!-- GRAFIK -->

<div class="card mt-4">

<div class="card-body">

<h5>Grafik Keuangan</h5>

<canvas id="chartKas"></canvas>

</div>

</div>

<!-- STATISTIK BLOK -->

<div class="card mt-4">

<div class="card-body">

<h5>Statistik Pembayaran</h5>

<div id="statistikBlok"></div>

</div>

</div>

<!-- RUMAH BELUM BAYAR -->

<div class="card mt-4">

<div class="card-body">

<h5>Rumah Belum Bayar</h5>

<div id="rumahBelumBayar"></div>

</div>

</div>

<!-- PETA BLOK -->

<div class="card mt-4">

<div class="card-body">

<h5>Peta Blok Rumah</h5>

<div id="mapPerumahan"></div>

</div>

</div>

<!-- ACTION -->

<div class="actionButtons">

<button onclick="showPopup('loginAdminPopup')">Login Admin</button>

<button onclick="showPopup('loginWargaPopup')">Login Warga</button>

<button onclick="showPopup('iuranPopup')">Input Iuran</button>

<button onclick="showPopup('pengeluaranPopup')">Input Pengeluaran</button>

<button onclick="exportExcel()">Export Excel</button>

</div>

</div>

<script src="firebase.js"></script>
<script src="app.js"></script>

</body>
</html>
